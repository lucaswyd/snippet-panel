name: Tag videos

on:
  repository_dispatch:
    types:
      - tag-videos

defaults:
  run:
    shell: bash

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Checkout snippets repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.SNIPPETS_REPO_OWNER }}/${{ secrets.SNIPPETS_REPO_NAME }}
          token: ${{ secrets.GH_PAT }}
          path: snippets-repo

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: Cache FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/ffmpeg
            /usr/local/bin/ffprobe
          key: ffmpeg-${{ runner.os }}-v1

      - name: Install FFmpeg
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y curl jq

          curl -fsSL https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz \
            -o /tmp/ffmpeg.tar.xz

          tar -xf /tmp/ffmpeg.tar.xz -C /tmp

          sudo mv /tmp/ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/ffmpeg
          sudo mv /tmp/ffmpeg-master-latest-linux64-gpl/bin/ffprobe /usr/local/bin/ffprobe

          ffmpeg -version

      - name: Prepare font
        run: |
          mkdir -p /tmp/fonts
          cp assets/fonts/SFPRODISPLAYMEDIUM.OTF /tmp/fonts/SFPRODISPLAYMEDIUM.OTF

      - name: Process snippet
        env:
          CALLBACK_SECRET: ${{ secrets.CALLBACK_SECRET }}
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          SNIPPETS_REPO_OWNER: ${{ secrets.SNIPPETS_REPO_OWNER }}
          SNIPPETS_REPO_NAME: ${{ secrets.SNIPPETS_REPO_NAME }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          WEBHOOK_PUBLIC_SNIPPETS: ${{ secrets.WEBHOOK_PUBLIC_SNIPPETS }}
          WEBHOOK_PRIVATE_SNIPPETS: ${{ secrets.WEBHOOK_PRIVATE_SNIPPETS }}
          WEBHOOK_PUBLIC_SEPARATOR: ${{ secrets.WEBHOOK_PUBLIC_SEPARATOR }}
          WEBHOOK_PRIVATE_SEPARATOR: ${{ secrets.WEBHOOK_PRIVATE_SEPARATOR }}
          WEBHOOK_NEW_SNIPPETS: ${{ secrets.WEBHOOK_NEW_SNIPPETS }}
          PUBLIC_CHANNEL_ID: ${{ secrets.PUBLIC_CHANNEL_ID }}
          PRIVATE_CHANNEL_ID: ${{ secrets.PRIVATE_CHANNEL_ID }}
          QUEUE_SNIPPET_DELAY_MS: "2000"
        run: |
          set -euo pipefail

          FONT="/tmp/fonts/SFPRODISPLAYMEDIUM.OTF"

          # Get snippet path from dispatch payload
          SNIPPET_PATH=$(echo '${{ toJson(github.event.client_payload) }}' | jq -r '.snippetPath // empty')
          QUEUE_ID=$(echo '${{ toJson(github.event.client_payload) }}' | jq -r '.queueId // empty')
          IS_NEW_SNIPPET=$(echo '${{ toJson(github.event.client_payload) }}' | jq -r '.isNew // false')
          PING_NEW_SNIPPET=$(echo '${{ toJson(github.event.client_payload) }}' | jq -r '.pingNewSnippet // false')

          if [ -z "$SNIPPET_PATH" ] || [ -z "$QUEUE_ID" ]; then
            echo "ERROR: Missing snippetPath or queueId in payload"
            exit 1
          fi

          # Path to snippet file in snippets repo checkout
          FILE="snippets-repo/${SNIPPET_PATH}"

          if [ ! -f "$FILE" ]; then
            echo "ERROR: Snippet file not found at $FILE"
            exit 1
          fi

          echo "Processing $FILE"

          TAGGED_LEN=$(jq '.tagged_media | length' "$FILE")
          UNTAG_LEN=$(jq '.untagged_media | length' "$FILE")
          SNIPPET_TITLE=$(jq -r '.title // "Untitled"' "$FILE")
          SAFE_TITLE=$(printf '%s' "$SNIPPET_TITLE" | tr '\n' ' ' | sed 's/[\\/:*?"<>|]/ /g; s/[[:space:]]\+/ /g; s/^ *//; s/ *$//')
          [ -n "$SAFE_TITLE" ] || SAFE_TITLE="Untitled"

          if [ "$UNTAG_LEN" -eq 0 ]; then
            echo "Skip: no untagged_media"
            exit 0
          fi

          BASE="${VERCEL_APP_URL%/}"

          fail_job() {
            local msg="$1"
            echo "ERROR: $msg"
            curl -fsS -X POST "${BASE}/api/internal-post-complete" \
              -H "Content-Type: application/json" \
              -H "x-internal-secret: ${CALLBACK_SECRET}" \
              -d "{\"queueId\":\"$QUEUE_ID\",\"ok\":false,\"errorMessage\":\"$msg\"}" || true
            exit 1
          }

          curl -fsS -X POST "${BASE}/api/internal-queue-status" \
            -H "Content-Type: application/json" \
            -H "x-internal-secret: ${CALLBACK_SECRET}" \
            -d "{\"queueId\":\"$QUEUE_ID\",\"status\":\"posting_private\"}"

          export FULL_POST_ACTION="full-post-queue-private"
          export FULL_POST_CLIENT_PAYLOAD
          FULL_POST_CLIENT_PAYLOAD=$(jq -n --arg p "$SNIPPET_PATH" '{snippetPath: $p}')
          npx tsx scripts/full-archive-post.ts || fail_job "private posting failed"

          cd snippets-repo
          git pull --rebase origin main || true
          cd ..

          TAG_URLS='[]'
          i=0

          while IFS= read -r URL; do
            [ -z "$URL" ] && continue

            # Fix incomplete URLs - add https://fast-file.com prefix if missing
            if [[ "$URL" == /* ]]; then
              URL="https://fast-file.com${URL}"
            elif [[ ! "$URL" =~ ^https?:// ]]; then
              URL="https://fast-file.com/${URL}"
            fi

            echo "Downloading from URL: $URL"
            i=$((i+1))

            OUT_EXT="mp4"
            RAW="snippet_${i}_raw.${OUT_EXT}"
            OUT="${SAFE_TITLE} (Snippet ${i}).${OUT_EXT}"
            # Retry download up to 3 times
            DOWNLOAD_SUCCESS=false
            for retry in {1..3}; do
              if curl -fL "$URL" -o "$RAW"; then
                DOWNLOAD_SUCCESS=true
                break
              else
                echo "Download attempt $retry failed, retrying..."
                sleep 2
              fi
            done

            if [ "$DOWNLOAD_SUCCESS" = false ]; then
              echo "ERROR: curl download failed for URL: $URL after 3 attempts"
              exit 1
            fi

            # Validate downloaded file
            if [ ! -f "$RAW" ]; then
              echo "ERROR: Download failed - file not created"
              exit 1
            fi

            FILE_SIZE=$(stat -c%s "$RAW" 2>/dev/null || stat -f%z "$RAW" 2>/dev/null || echo "0")
            if [ "$FILE_SIZE" -lt 1000 ]; then
              echo "ERROR: Downloaded file is too small (${FILE_SIZE} bytes), likely invalid"
              cat "$RAW" | head -c 500
              exit 1
            fi

            # Validate it's a video file
            if ! ffprobe -v error -show_entries format=format_name -of default=noprint_wrappers=1:nokey=1 "$RAW" 2>/dev/null | grep -q "mp4\|mov\|webm"; then
              echo "ERROR: Downloaded file is not a valid video file"
              ffprobe -v error "$RAW" 2>&1 | head -20
              exit 1
            fi

            echo "Successfully downloaded video (${FILE_SIZE} bytes)"

            FILTER="drawtext=fontfile='${FONT}':text='Prada Hub':fontsize=h*0.03:fontcolor=white@0.5:x=(w-text_w)/2:y=h*0.05,drawtext=fontfile='${FONT}':text='discord.gg/Pradabagshawty':fontsize=h*0.024:fontcolor=white@0.5:x=(w-text_w)/2:y=h*0.05+h*0.03,drawtext=fontfile='${FONT}':text='Prada Hub':fontsize=h*0.03:fontcolor=white@0.5:x=(w-text_w)/2:y=h*0.45,drawtext=fontfile='${FONT}':text='discord.gg/Pradabagshawty':fontsize=h*0.024:fontcolor=white@0.5:x=(w-text_w)/2:y=h*0.45+h*0.03,drawtext=fontfile='${FONT}':text='Prada Hub':fontsize=h*0.03:fontcolor=white@0.5:x=(w-text_w)/2:y=h*0.85,drawtext=fontfile='${FONT}':text='discord.gg/Pradabagshawty':fontsize=h*0.024:fontcolor=white@0.5:x=(w-text_w)/2:y=h*0.85+h*0.03"

            ffmpeg -y -i "$RAW" \
              -map 0:v:0 -map 0:a:0? \
              -dn -sn \
              -map_metadata -1 -map_chapters -1 \
              -vf "$FILTER" \
              -c:v libx264 -pix_fmt yuv420p \
              -profile:v high -level:v 4.1 \
              -movflags +faststart \
              -brand mp42 \
              -video_track_timescale 30000 \
              -c:a aac -b:a 128k -ar 48000 -ac 2 \
              "$OUT"
            PROBE=$(ffprobe -v error -show_entries stream=codec_type,codec_name,pix_fmt -of json "$OUT")
            echo "$PROBE"
            echo "$PROBE" | jq -e '.streams | map(select(.codec_type=="video")) | length == 1' >/dev/null
            echo "$PROBE" | jq -e '.streams | all(.codec_type != "data" and .codec_type != "subtitle")' >/dev/null
            echo "$PROBE" | jq -e '.streams | any(.codec_type=="video" and .codec_name=="h264" and .pix_fmt=="yuv420p")' >/dev/null
            RESP=$(curl -fsS -X POST https://fast-file.com/upload -F "files=@${OUT};type=video/mp4")
            TITLE=$(echo "$RESP" | jq -r '.files[0].title // empty')

            if [ -z "$TITLE" ] || [ "$TITLE" = "null" ]; then
              echo "fast-file upload failed for $FILE"
              exit 1
            fi

            DL="https://fast-file.com/${TITLE}/download"
            TAG_URLS=$(echo "$TAG_URLS" | jq --arg u "$DL" '. + [$u]')

            rm -f "$RAW" "$OUT"
          done < <(jq -r '.untagged_media[]' "$FILE")

          jq --argjson tagged "$TAG_URLS" 'del(._queueId) | .tagged_media = $tagged' "$FILE" > "${FILE}.tmp"
          mv "${FILE}.tmp" "$FILE"

          cd snippets-repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add "$SNIPPET_PATH"
          git commit -m "Tag media for ${SNIPPET_PATH}"
          git push origin HEAD
          cd ..

          curl -fsS -X POST "${BASE}/api/internal-queue-status" \
            -H "Content-Type: application/json" \
            -H "x-internal-secret: ${CALLBACK_SECRET}" \
            -d "{\"queueId\":\"$QUEUE_ID\",\"status\":\"posting_public\"}"

          export FULL_POST_ACTION="full-post-queue-public"
          FULL_POST_CLIENT_PAYLOAD=$(jq -n --arg p "$SNIPPET_PATH" --argjson t "$TAG_URLS" --argjson isNew "$IS_NEW_SNIPPET" --argjson ping "$PING_NEW_SNIPPET" '{snippetPath: $p, taggedMediaUrls: $t, isNew: $isNew, pingNewSnippet: $ping}')
          npx tsx scripts/full-archive-post.ts || fail_job "public posting failed"

          curl -fsS -X POST "${BASE}/api/internal-post-complete" \
            -H "Content-Type: application/json" \
            -H "x-internal-secret: ${CALLBACK_SECRET}" \
            -d "{\"queueId\":\"$QUEUE_ID\",\"ok\":true}"
